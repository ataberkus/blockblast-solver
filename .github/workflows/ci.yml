name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.13"]
        include:
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            python -m pip install -e ".[dev,windows]"
          else
            python -m pip install -e ".[dev]"
          fi
      - name: Lint
        run: ruff check .
      - name: Test
        run: coverage run -m unittest discover -s tests -v
      - name: Coverage
        run: |
          coverage report
          coverage report --omit=block_blast_solver/modules/solver.py --fail-under=70
      - name: Windows capture import smoke test
        if: runner.os == 'Windows'
        run: python -c "from block_blast_solver.modules.capture import WindowCapture"
